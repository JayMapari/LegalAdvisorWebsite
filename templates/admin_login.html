{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<!-- Animated Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
    <div class="absolute top-20 left-10 w-72 h-72 bg-brand-gold/10 rounded-full blur-3xl animate-float"></div>
    <div class="absolute bottom-20 right-10 w-96 h-96 bg-brand-navy/5 rounded-full blur-3xl animate-zoom-slow"></div>
    <div class="absolute top-1/2 left-1/2 w-80 h-80 bg-blue-500/5 rounded-full blur-3xl animate-float" style="animation-delay: 2s;"></div>
</div>

<!-- Fullscreen Auth Container -->
<div class="fixed inset-0 flex items-center justify-center px-4 bg-gradient-to-br from-brand-navy via-slate-900 to-brand-navy">
    
    <!-- Login Card -->
    <div class="card-elevate w-full max-w-md bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 overflow-hidden animate-fade-in-up">
        
        <!-- Card Header -->
        <div class="p-6 md:p-8 text-center relative">
            <!-- Decorative Circle -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand-gold/10 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>
            
            <div class="relative z-10">
                <div class="w-16 h-16 bg-gradient-to-br from-brand-gold to-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-brand-gold/30">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
                <h1 class="font-serif text-2xl md:text-3xl text-white font-light mb-2">
                    Admin <span class="font-semibold gradient-text">Panel</span>
                </h1>
                <p class="text-slate-300 text-sm font-light">Secure access to dashboard</p>
            </div>
        </div>

        <!-- Form Body -->
        <div class="p-6 md:p-8 pt-0">
            
            <!-- Error Message -->
            {% if error %}
            <div class="mb-6 p-4 bg-red-500/10 border-l-4 border-red-500 rounded-lg animate-fade-in-up">
                <div class="flex items-start gap-3">
                    <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <div>
                        <p class="text-sm font-semibold text-red-300">Access Denied</p>
                        <p class="text-sm text-red-200 mt-1">{{ error }}</p>
                    </div>
                </div>
            </div>
            {% endif %}

            <form method="POST" class="space-y-5" id="admin-login-form">
                
                <!-- Username Input -->
                <div class="space-y-2">
                    <label for="username" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider">
                        Username
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400 group-focus-within:text-brand-gold transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            class="w-full pl-12 pr-4 py-3.5 rounded-lg border border-white/10 bg-white/5 focus:border-brand-gold focus:ring-2 focus:ring-brand-gold/20 outline-none transition-all font-light text-white placeholder-slate-400 hover:border-white/20"
                            placeholder="Enter admin username"
                            required
                            autocomplete="username">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-2">
                    <label for="password" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider">
                        Password
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400 group-focus-within:text-brand-gold transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="w-full pl-12 pr-12 py-3.5 rounded-lg border border-white/10 bg-white/5 focus:border-brand-gold focus:ring-2 focus:ring-brand-gold/20 outline-none transition-all font-light text-white placeholder-slate-400 hover:border-white/20"
                            placeholder="Enter admin password"
                            required
                            autocomplete="current-password">
                        <button 
                            type="button" 
                            id="toggle-password" 
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-brand-gold transition-colors"
                            aria-label="Toggle password visibility">
                            <svg id="eye-open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            <svg id="eye-closed" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="submit-btn"
                    class="btn-scale w-full px-8 py-4 bg-gradient-to-r from-brand-gold to-amber-500 text-white font-semibold rounded-lg hover:from-brand-gold hover:to-amber-600 shadow-lg shadow-brand-gold/30 transition-all flex items-center justify-center gap-2 mt-6">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                    </svg>
                    <span id="btn-text">Sign In</span>
                    <svg id="btn-spinner" class="animate-spin w-5 h-5 hidden" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>

                <!-- Security Note -->
                <div class="pt-4 text-center">
                    <p class="text-xs text-slate-400 flex items-center justify-center gap-1.5">
                        <svg class="w-3.5 h-3.5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        Admin access only • Secure login
                    </p>
                </div>

            </form>

            <!-- Back to Home Link -->
            <div class="mt-6 text-center">
                <a href="/" class="text-xs text-slate-400 hover:text-brand-gold font-medium transition-colors inline-flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Home
                </a>
            </div>

        </div>
    </div>
</div>

<!-- Password Toggle & Form JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Password Toggle Functionality
    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');
    
    if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle eye icons
            if (type === 'text') {
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
                togglePassword.classList.add('text-brand-gold');
                togglePassword.classList.remove('text-slate-400');
            } else {
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
                togglePassword.classList.remove('text-brand-gold');
                togglePassword.classList.add('text-slate-400');
            }
            
            // Keep focus on input
            passwordInput.focus();
        });
    }
    
    // Form Submission with Loading State
    const loginForm = document.getElementById('admin-login-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    
    if (loginForm && submitBtn) {
        loginForm.addEventListener('submit', function() {
            submitBtn.disabled = true;
            btnText.textContent = 'Authenticating...';
            btnSpinner.classList.remove('hidden');
        });
    }
    
    // Input Focus Animations
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.classList.add('scale-[1.02]');
        });
        input.addEventListener('blur', function() {
            this.parentElement.classList.remove('scale-[1.02]');
        });
    });
});
</script>

<!-- Custom Styles -->
<style>
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-fade-in-up {
    animation: fadeInUp 0.6s ease-out forwards;
}

@keyframes float {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-10px);
    }
}

.animate-float {
    animation: float 6s ease-in-out infinite;
}

@keyframes zoomSlow {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.05);
    }
}

.animate-zoom-slow {
    animation: zoomSlow 20s ease-in-out infinite;
}

.card-elevate {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.card-elevate:hover {
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
}

.btn-scale {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-scale:hover {
    transform: scale(1.02);
}

.btn-scale:active {
    transform: scale(0.98);
}

.gradient-text {
    background: linear-gradient(135deg, #d4af37 0%, #f5e6a3 50%, #d4af37 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* Input Focus Animation */
input:focus {
    transform: scale(1.01);
}

/* Smooth Transitions */
* {
    transition-property: background-color, border-color, color, fill, stroke;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    transition-duration: 150ms;
}

/* Mobile Responsiveness */
@media (max-width: 640px) {
    .md\:p-8 {
        padding: 1.5rem;
    }
    
    .text-2xl.md\:text-3xl {
        font-size: 1.5rem;
    }
    
    .w-16.h-16 {
        width: 3.5rem;
        height: 3.5rem;
    }
}
</style>
{% endblock %}
