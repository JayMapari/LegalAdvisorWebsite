{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<!-- Auth Layout Override - Full Viewport Independent Layout -->
<div class="fixed inset-0 w-full h-full overflow-hidden bg-gradient-to-br from-brand-navy via-slate-900 to-brand-navy" style="z-index: 9999;">
    
    <!-- Full-Screen Animated Background Image - MATCHING LOGIN PAGE -->
    <div class="fixed inset-0 w-full h-full overflow-hidden" style="z-index: -10;">
        <!-- Background Image with Ken Burns Effect - SAME JUSTICE SCALE IMAGE AS LOGIN -->
        <div class="absolute inset-0 w-full h-full bg-cover bg-center animate-ken-burns" 
             style="background-image: url('https://images.unsplash.com/photo-1505664194779-8beaceb93744?ixlib=rb-4.0.3&auto=format&fit=crop&w=2400&q=80');">
        </div>
        
        <!-- Dark Gradient Overlay for Readability -->
        <div class="absolute inset-0 bg-gradient-to-br from-black/60 via-black/40 to-black/60"></div>
        
        <!-- Additional Radial Overlay for Focus -->
        <div class="absolute inset-0 bg-radial-gradient from-transparent via-black/20 to-black/40"></div>
    </div>

    <!-- Centered Reset Password Card Container - True Center Without Padding Hacks -->
    <div class="fixed inset-0 flex items-center justify-center px-4" style="z-index: 10;">
        
        <!-- Reset Password Card -->
        <div class="w-full max-w-md animate-card-float scale-[0.98]">
            
            <!-- Card Glow Effect -->
            <div class="absolute inset-0 bg-brand-gold/20 blur-[60px] rounded-3xl opacity-50 animate-pulse-slow"></div>
            
            <!-- Main Card - Compact Padding -->
            <div class="relative bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 p-6 md:p-8 hover:shadow-3xl hover:shadow-brand-gold/10 hover:border-white/30 transition-all duration-700 hover:-translate-y-1">
                
                <!-- Logo -->
                <div class="w-14 h-14 bg-gradient-to-br from-brand-gold to-amber-500 rounded-xl flex items-center justify-center mx-auto mb-5 shadow-lg shadow-brand-gold/30 animate-fade-in-up">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>

                <!-- Form Header -->
                <div class="text-center mb-6 animate-fade-in-up" style="animation-delay: 0.1s;">
                    <h2 class="font-serif text-2xl md:text-3xl text-white font-light mb-1">Reset Password</h2>
                    <p class="text-slate-300 font-light text-xs">Enter your new password to continue</p>
                </div>

                <!-- Reset Password Form -->
                <form method="POST" action="/reset-password" class="space-y-4" id="reset-password-form">
                    
                    <!-- Hidden Email Input (Required for Backend) -->
                    <input type="hidden" name="email" value="{{ email }}">
                    
                    <!-- New Password Input -->
                    <div class="animate-fade-in-up" style="animation-delay: 0.2s;">
                        <label for="new_password" class="block text-xs font-medium text-slate-300 mb-1.5">
                            New Password
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-slate-400 group-focus-within:text-brand-gold transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            </div>
                            <input 
                                type="password" 
                                id="new_password" 
                                name="new_password" 
                                class="w-full pl-10 pr-10 py-2.5 bg-white/5 border border-white/10 rounded-lg focus:border-brand-gold focus:ring-2 focus:ring-brand-gold/20 outline-none transition-all duration-300 text-white placeholder-slate-400 hover:bg-white/10 hover:border-white/20 text-sm"
                                placeholder="••••••••"
                                required
                                autocomplete="new-password">
                            <button 
                                type="button" 
                                id="toggle-password" 
                                class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-brand-gold transition-colors duration-300"
                                aria-label="Toggle password visibility">
                                <svg id="eye-open" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                                <svg id="eye-closed" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                                </svg>
                            </button>
                        </div>
                        <p class="text-xs text-slate-400 mt-2">Must be at least 8 characters long</p>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="submit-btn"
                        class="btn-scale w-full px-6 py-3 bg-gradient-to-r from-brand-gold to-amber-500 text-white font-semibold rounded-lg hover:from-brand-gold hover:to-amber-600 shadow-lg shadow-brand-gold/30 transition-all duration-300 flex items-center justify-center gap-2 animate-fade-in-up"
                        style="animation-delay: 0.3s;">
                        <span id="btn-text">Reset Password</span>
                        <svg id="btn-spinner" class="animate-spin w-4 h-4 hidden" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>

                    <!-- Security Indicators -->
                    <div class="pt-3 border-t border-white/10 animate-fade-in-up" style="animation-delay: 0.4s;">
                        <div class="flex items-center justify-center gap-1.5 text-xs text-slate-400">
                            <svg class="w-3.5 h-3.5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            <span>Secure password reset</span>
                        </div>
                    </div>

                </form>

                <!-- Back to Login Link -->
                <div class="mt-6 text-center animate-fade-in-up" style="animation-delay: 0.5s;">
                    <p class="text-xs text-slate-300">
                        Remember your password?
                        <a href="/login" class="text-brand-gold hover:text-amber-400 font-semibold transition-colors duration-300">
                            Back to Login
                        </a>
                    </p>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- Password Toggle & Form JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Password Toggle Functionality
    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('new_password');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');
    
    if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle eye icons
            if (type === 'text') {
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
                togglePassword.classList.add('text-brand-gold');
                togglePassword.classList.remove('text-slate-400');
            } else {
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
                togglePassword.classList.remove('text-brand-gold');
                togglePassword.classList.add('text-slate-400');
            }
            
            // Keep focus on input
            passwordInput.focus();
        });
    }
    
    // Form Submission with Loading State
    const resetPasswordForm = document.getElementById('reset-password-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    
    if (resetPasswordForm && submitBtn) {
        resetPasswordForm.addEventListener('submit', function() {
            submitBtn.disabled = true;
            btnText.textContent = 'Resetting...';
            btnSpinner.classList.remove('hidden');
        });
    }
    
    // Input Focus Animations
    const inputs = document.querySelectorAll('input[type="password"]');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.classList.add('scale-[1.02]');
        });
        input.addEventListener('blur', function() {
            this.parentElement.classList.remove('scale-[1.02]');
        });
    });
});
</script>

<!-- Custom Styles -->
<style>
/* Prevent Scroll on Auth Page */
body {
    overflow: hidden;
}

/* Ken Burns Effect - 10 Second Smooth Loop */
@keyframes kenBurns {
    0% {
        transform: scale(1) translate(0, 0);
    }
    25% {
        transform: scale(1.05) translate(-1%, -1%);
    }
    50% {
        transform: scale(1.1) translate(0, 0);
    }
    75% {
        transform: scale(1.05) translate(1%, 1%);
    }
    100% {
        transform: scale(1) translate(0, 0);
    }
}

/* Fade In Up Animation */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Pulse Slow Animation */
@keyframes pulseSlow {
    0%, 100% {
        opacity: 0.3;
        transform: scale(1);
    }
    50% {
        opacity: 0.5;
        transform: scale(1.1);
    }
}

/* Card Float Animation */
@keyframes cardFloat {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-5px);
    }
}

/* Animation Classes */
.animate-ken-burns {
    animation: kenBurns 10s ease-in-out infinite;
    will-change: transform;
}

.animate-fade-in-up {
    animation: fadeInUp 0.6s ease-out forwards;
    opacity: 0;
}

.animate-pulse-slow {
    animation: pulseSlow 8s ease-in-out infinite;
}

.animate-card-float {
    animation: cardFloat 6s ease-in-out infinite;
}

/* Button Scale */
.btn-scale {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-scale:hover {
    transform: scale(1.02);
}

.btn-scale:active {
    transform: scale(0.98);
}

/* Card Hover Effect */
.bg-white\/10:hover {
    box-shadow: 0 25px 50px -12px rgba(212, 175, 55, 0.15);
}

/* Input Focus */
input:focus {
    transform: scale(1.01);
}

/* Smooth Transitions */
* {
    transition-property: background-color, border-color, color, fill, stroke;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    transition-duration: 150ms;
}

/* Radial Gradient Overlay */
.bg-radial-gradient {
    background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
}

/* Mobile Responsiveness */
@media (max-width: 640px) {
    .p-6.md\:p-8 {
        padding: 1.25rem;
    }
    
    .text-2xl.md\:text-3xl {
        font-size: 1.5rem;
    }
    
    .w-14.h-14 {
        width: 3.5rem;
        height: 3.5rem;
    }
}
</style>
{% endblock %}
