{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<!-- Auth Layout Override - Full Viewport Independent Layout -->
<div class="fixed inset-0 w-full h-full overflow-hidden bg-gradient-to-br from-brand-navy via-slate-900 to-brand-navy" style="z-index: 9999;">
    
    <!-- Full-Screen Animated Background Image - MATCHING LOGIN PAGE -->
    <div class="fixed inset-0 w-full h-full overflow-hidden" style="z-index: -10;">
        <!-- Background Image with Ken Burns Effect - SAME JUSTICE SCALE IMAGE AS LOGIN -->
        <div class="absolute inset-0 w-full h-full bg-cover bg-center animate-ken-burns" 
             style="background-image: url('https://images.unsplash.com/photo-1505664194779-8beaceb93744?ixlib=rb-4.0.3&auto=format&fit=crop&w=2400&q=80');">
        </div>
        
        <!-- Dark Gradient Overlay for Readability -->
        <div class="absolute inset-0 bg-gradient-to-br from-black/60 via-black/40 to-black/60"></div>
        
        <!-- Additional Radial Overlay for Focus -->
        <div class="absolute inset-0 bg-radial-gradient from-transparent via-black/20 to-black/40"></div>
    </div>

    <!-- Centered Forgot Password Card Container - True Center Without Padding Hacks -->
    <div class="fixed inset-0 flex items-center justify-center px-4" style="z-index: 10;">
        
        <!-- Forgot Password Card -->
        <div class="w-full max-w-md animate-card-float scale-[0.98]">
            
            <!-- Card Glow Effect -->
            <div class="absolute inset-0 bg-brand-gold/20 blur-[60px] rounded-3xl opacity-50 animate-pulse-slow"></div>
            
            <!-- Main Card - Compact Padding -->
            <div class="relative bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 p-6 md:p-8 hover:shadow-3xl hover:shadow-brand-gold/10 hover:border-white/30 transition-all duration-700 hover:-translate-y-1">
                
                <!-- Logo -->
                <div class="w-14 h-14 bg-gradient-to-br from-brand-gold to-amber-500 rounded-xl flex items-center justify-center mx-auto mb-5 shadow-lg shadow-brand-gold/30 animate-fade-in-up">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>

                <!-- Form Header -->
                <div class="text-center mb-6 animate-fade-in-up" style="animation-delay: 0.1s;">
                    <h2 class="font-serif text-2xl md:text-3xl text-white font-light mb-1">Forgot Password</h2>
                    <p class="text-slate-300 font-light text-xs">Enter your email to reset your password</p>
                </div>

                <!-- Error Message -->
                {% if error %}
                <div class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg animate-fade-in-up" style="animation-delay: 0.2s;">
                    <div class="flex items-start gap-2">
                        <svg class="w-4 h-4 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <div>
                            <p class="text-xs font-semibold text-red-300">Verification Failed</p>
                            <p class="text-xs text-red-200 mt-0.5">{{ error }}</p>
                        </div>
                    </div>
                </div>
                {% endif %}

                <!-- Forgot Password Form -->
                <form method="POST" action="/forgot-password" class="space-y-4" id="forgot-password-form">
                    
                    <!-- Email Input -->
                    <div class="animate-fade-in-up" style="animation-delay: 0.3s;">
                        <label for="email" class="block text-xs font-medium text-slate-300 mb-1.5">
                            Email Address
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-slate-400 group-focus-within:text-brand-gold transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                                </svg>
                            </div>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                class="w-full pl-10 pr-3 py-2.5 bg-white/5 border border-white/10 rounded-lg focus:border-brand-gold focus:ring-2 focus:ring-brand-gold/20 outline-none transition-all duration-300 text-white placeholder-slate-400 hover:bg-white/10 hover:border-white/20 text-sm"
                                placeholder="your@email.com"
                                required
                                autocomplete="email">
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="submit-btn"
                        class="btn-scale w-full px-6 py-3 bg-gradient-to-r from-brand-gold to-amber-500 text-white font-semibold rounded-lg hover:from-brand-gold hover:to-amber-600 shadow-lg shadow-brand-gold/30 transition-all duration-300 flex items-center justify-center gap-2 animate-fade-in-up"
                        style="animation-delay: 0.4s;">
                        <span id="btn-text">Verify Email</span>
                        <svg id="btn-spinner" class="animate-spin w-4 h-4 hidden" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>

                    <!-- Security Indicators -->
                    <div class="pt-3 border-t border-white/10 animate-fade-in-up" style="animation-delay: 0.5s;">
                        <div class="flex items-center justify-center gap-1.5 text-xs text-slate-400">
                            <svg class="w-3.5 h-3.5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            <span>Secure verification</span>
                        </div>
                    </div>

                </form>

                <!-- Back to Login Link -->
                <div class="mt-6 text-center animate-fade-in-up" style="animation-delay: 0.6s;">
                    <p class="text-xs text-slate-300">
                        Remember your password?
                        <a href="/login" class="text-brand-gold hover:text-amber-400 font-semibold transition-colors duration-300">
                            Back to Login
                        </a>
                    </p>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- Form JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Form Submission with Loading State
    const forgotPasswordForm = document.getElementById('forgot-password-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    
    if (forgotPasswordForm && submitBtn) {
        forgotPasswordForm.addEventListener('submit', function() {
            submitBtn.disabled = true;
            btnText.textContent = 'Verifying...';
            btnSpinner.classList.remove('hidden');
        });
    }
    
    // Input Focus Animations
    const inputs = document.querySelectorAll('input[type="email"]');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.classList.add('scale-[1.02]');
        });
        input.addEventListener('blur', function() {
            this.parentElement.classList.remove('scale-[1.02]');
        });
    });
});
</script>

<!-- Custom Styles -->
<style>
/* Prevent Scroll on Auth Page */
body {
    overflow: hidden;
}

/* Ken Burns Effect - 10 Second Smooth Loop */
@keyframes kenBurns {
    0% {
        transform: scale(1) translate(0, 0);
    }
    25% {
        transform: scale(1.05) translate(-1%, -1%);
    }
    50% {
        transform: scale(1.1) translate(0, 0);
    }
    75% {
        transform: scale(1.05) translate(1%, 1%);
    }
    100% {
        transform: scale(1) translate(0, 0);
    }
}

/* Fade In Up Animation */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Pulse Slow Animation */
@keyframes pulseSlow {
    0%, 100% {
        opacity: 0.3;
        transform: scale(1);
    }
    50% {
        opacity: 0.5;
        transform: scale(1.1);
    }
}

/* Card Float Animation */
@keyframes cardFloat {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-5px);
    }
}

/* Animation Classes */
.animate-ken-burns {
    animation: kenBurns 10s ease-in-out infinite;
    will-change: transform;
}

.animate-fade-in-up {
    animation: fadeInUp 0.6s ease-out forwards;
    opacity: 0;
}

.animate-pulse-slow {
    animation: pulseSlow 8s ease-in-out infinite;
}

.animate-card-float {
    animation: cardFloat 6s ease-in-out infinite;
}

/* Button Scale */
.btn-scale {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-scale:hover {
    transform: scale(1.02);
}

.btn-scale:active {
    transform: scale(0.98);
}

/* Card Hover Effect */
.bg-white\/10:hover {
    box-shadow: 0 25px 50px -12px rgba(212, 175, 55, 0.15);
}

/* Input Focus */
input:focus {
    transform: scale(1.01);
}

/* Smooth Transitions */
* {
    transition-property: background-color, border-color, color, fill, stroke;
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    transition-duration: 150ms;
}

/* Radial Gradient Overlay */
.bg-radial-gradient {
    background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
}

/* Mobile Responsiveness */
@media (max-width: 640px) {
    .p-6.md\:p-8 {
        padding: 1.25rem;
    }
    
    .text-2xl.md\:text-3xl {
        font-size: 1.5rem;
    }
    
    .w-14.h-14 {
        width: 3.5rem;
        height: 3.5rem;
    }
}
</style>
{% endblock %}
